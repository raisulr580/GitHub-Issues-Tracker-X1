<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #0366d6;
      --active-tab: #6f42c1;
      --open: #2ecc71;
      --closed: #9b59b6;
      --gray: #7f8c8d;
      --light-gray: #f6f8fa;
      --deep-gray: #495057;
      --bug-text: #c62828;
      --bug-bg: #ffebee;
      --enhancement-text: #2e7d32;
      --enhancement-bg: #e8f5e9;
      --help-text: #e67e22;
      --help-bg: #fff0e6;
      --goodfirst-text: #27ae60;
      --goodfirst-bg: #e8f8f5;
      --doc-text: #8e44ad;
      --doc-bg: #f5ebfa;
      --other-text: #d35400;
      --other-bg: #fff5e6;
      --high: #c62828;
      --medium: #f57c00;
      --low: #adb5bd;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6fa;
      color: #2c3e50;
      min-height: 100vh;
    }
